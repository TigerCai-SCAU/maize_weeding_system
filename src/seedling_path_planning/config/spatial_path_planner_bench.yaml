spatial_path_planner:
  ros__parameters:
    seedling_map_topic: /seedling/map_points
    terrain_topic: /ground/global_elevation_points
    path_topic: /weeding/tool_path
    work_points_topic: /weeding/work_points
    arm_1_path_topic: /weeding/arm_1/tool_path
    arm_1_work_points_topic: /weeding/arm_1/work_points
    arm_2_path_topic: /weeding/arm_2/tool_path
    arm_2_work_points_topic: /weeding/arm_2/work_points
    marker_topic: /weeding/path_markers
    status_topic: /weeding/plan_status
    world_frame: camera_init

    # Bench convention: virtual conveyor travel z, lateral y, height x.
    travel_axis: "z"
    lateral_axis: "y"
    height_axis: "x"

    expected_row_spacing: 0.55
    expected_plant_spacing: 0.20
    row_cluster_threshold: 0.0
    plant_spacing_tolerance: 0.35
    min_plants_per_row: 2

    protection_radius: 0.05
    safety_margin: 0.0
    s_sweep_offset: 0.05
    s_close_cluster_gap: 0.0
    s_first_side: 1
    coverage_spacing: 0.06
    path_resolution: 0.005
    lateral_work_margin: 0.10
    travel_work_margin: 0.05
    max_grid_cells: 250000

    # Bench safety mode: keep the tool 2 cm above the conveyor surface.
    # Bench height is camera_init x and +x points toward the conveyor/downward.
    tool_surface_offset: 0.02
    height_axis_up_sign: -1
    terrain_search_radius: 0.18
    terrain_nearest_count: 24
    terrain_min_neighbors: 3
    terrain_max_fit_rms: 0.025
    terrain_max_slope_deg: 35.0
    max_terrain_points: 30000

    replan_period_sec: 1.0
    minimum_map_points: 4
