oid_wheel_encoder:
  ros__parameters:
    # Indoor conveyor: encoder is on can0 and forward belt motion is positive.
    can_interface: "can0"
    encoder_id: 1
    counts_per_rev: 32768

    wheel_diameter_m: 0.063
    encoder_revs_per_wheel_rev: 1.0
    direction: 1

    poll_hz: 50.0
    min_dt_sec: 0.005
    max_dt_sec: 0.20
    max_speed_mps: 3.0
    velocity_alpha: 0.35
    velocity_variance: 0.04

    odom_topic: "/wheel/odom"
    frame_id: "wheel_odom"
    child_frame_id: "aft_mapped"

bench_virtual_odom:
  ros__parameters:
    input_topic: "/wheel/odom"
    output_topic: "/bench/aft_mapped_to_init"
    world_frame: "camera_init"
    child_frame: "body"

    # In the current camera_init convention, axis 0 is vertical, axis 1 is
    # lateral, and vehicle forward is negative axis 2.
    translation_per_meter: [0.0, 0.0, -1.0]
    origin_xyz: [0.0, 0.0, 0.0]
    orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    zero_on_start: true
