oid_wheel_encoder:
  ros__parameters:
    # The encoder defaults to CAN 2.0 standard frames, ID 1, 500 kbit/s.
    # This node only polls position (FUNC 0x01); it does not rewrite persistent encoder settings.
    can_interface: "can0"
    encoder_id: 1
    counts_per_rev: 32768

    wheel_diameter_m: 0.063
    encoder_revs_per_wheel_rev: 1.0
    direction: -1                # Forward wheel rotation must publish positive speed.

    poll_hz: 50.0
    min_dt_sec: 0.005
    max_dt_sec: 0.20
    max_speed_mps: 3.0
    velocity_alpha: 0.35
    velocity_variance: 0.04      # Includes soil slip; do not use encoder quantization alone.

    odom_topic: "/wheel/odom"
    frame_id: "wheel_odom"
    child_frame_id: "aft_mapped"
